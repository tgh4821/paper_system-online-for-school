<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海大小报 - 页面已下线</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2a37;
            --muted: #6b7280;
            --primary: #0d6efd;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: radial-gradient(circle at 20% 20%, #e8f0ff 0%, var(--bg) 45%, #eef2f7 100%);
            color: var(--text);
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 32px 28px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            line-height: 1.3;
        }

        p {
            margin: 8px 0;
            line-height: 1.7;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            background: var(--primary);
            transition: transform 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <main class="card" role="main" aria-labelledby="offline-title">
        <h1 id="offline-title">专栏投稿已下线</h1>
        <p>专栏投稿任务已完成，此页面不再提供投稿与管理功能。</p>
        <p class="muted">系统将在 3 秒后自动返回活动投稿页。</p>
        <a class="btn" href="index.html">立即返回活动投稿</a>
    </main>

    <script>
        setTimeout(function () {
            window.location.href = 'index.html';
        }, 3000);
    </script>
</body>

</html>
